<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - PinolApp Control</title>
    <link rel="stylesheet" href="css/admin-style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="sidebar">
        <h2>PinolApp Admin</h2>
        <nav>
            <a href="dashboard.html" class="active">📊 Resumen</a>
            <a href="restaurantes.html">🍳 Restaurantes</a>
            <a href="repartidores.html">🛵 Repartidores</a>
            <a href="pedidos.html">📦 Todos los Pedidos</a>
        </nav>
    </div>

    <main class="main-content">
        <header>
            <h1>Panel de Control Maestro</h1>
        </header>

        <div class="stats-grid">
            <div class="card">
                <h3>Ventas Totales (Hoy)</h3>
                <p id="total-ventas">C$ 0.00</p>
            </div>
            <div class="card">
                <h3>Pedidos en Curso</h3>
                <p id="pedidos-activos">0</p>
            </div>
            <div class="card">
                <h3>Repartidores Online</h3>
                <p id="drivers-online">0</p>
            </div>
        </div>

        <section class="recent-orders">
            <h3>Últimos Pedidos en Nicaragua</h3>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Restaurante</th>
                        <th>Total</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="lista-global-pedidos">
                    </tbody>
            </table>
        </section>
    </main>

    <script src="../restaurant/js/supabase-config.js"></script>
    <script src="js/admin-logic.js"></script>
</body>
</html>
