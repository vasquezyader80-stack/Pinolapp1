<main style="padding: 20px;">
    <h2>Control de Repartidores</h2>
    <div class="search-box">
        <input type="text" placeholder="Buscar por placa o nombre...">
    </div>
    <table style="width:100%; margin-top: 20px; border-collapse: collapse;">
        <thead>
            <tr style="background: #eee;">
                <th>Nombre</th>
                <th>Vehículo</th>
                <th>Estado</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="lista-repartidores">
            </tbody>
    </table>
</main>
