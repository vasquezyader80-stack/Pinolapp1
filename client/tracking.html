<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rastreo - PinolApp</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 60vh; width: 100%; }
        .info-repartidor { padding: 20px; background: white; border-radius: 30px 30px 0 0; position: relative; margin-top: -30px; }
        .driver-flex { display: flex; align-items: center; gap: 15px; }
        .driver-flex img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; }
        .btn-call { background: #4CAF50; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; text-decoration: none; margin-left: auto; }
    </style>
</head>
<body>
    <div id="map"></div>

    <div class="info-repartidor">
        <div class="driver-flex">
            <img src="images/driver.jpg" onerror="this.src='https://via.placeholder.com/60?text=Joel'">
            <div>
                <h3 id="driver-name">Joel M.</h3>
                <p id="status-text">Tu pedido está en camino...</p>
            </div>
            <a href="tel:+50588889999" class="btn-call">📞</a>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script>
        const map = L.map('map').setView([12.4378, -86.8784], 14); // León, Nicaragua por defecto
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        const motoIcon = L.icon({
            iconUrl: 'images/moto-icon.png', // Asegúrate de tener esta imagen
            iconSize: [40, 40]
        });

        let marker = L.marker([12.4378, -86.8784], { icon: motoIcon }).addTo(map);

        // Escuchar la ubicación del repartidor en tiempo real
        function seguirRepartidor() {
            _supabase.channel('tracking-repartidor')
            .on('postgres_changes', { event: 'UPDATE', table: 'repartidores' }, payload => {
                const newPos = [payload.new.latitud, payload.new.longitud];
                marker.setLatLng(newPos);
                map.panTo(newPos);
            }).subscribe();
        }

        document.addEventListener('DOMContentLoaded', seguirRepartidor);
    </script>
</body>
</html>
