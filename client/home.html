<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PinolApp - Inicio</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="home-header">
        <div class="user-info">
            <p>Hola, <span id="user-name">Usuario</span> 👋</p>
            <h3>¿Qué te gustaría pedir hoy?</h3>
        </div>
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Buscar en PinolApp...">
        </div>
    </header>

    <section class="categories">
        <div class="cat-item" onclick="filtrar('Restaurantes')">
            <div class="icon-circle bg-red">🍴</div>
            <span>Restaurantes</span>
        </div>
        <div class="cat-item" onclick="filtrar('Rapido')">
            <div class="icon-circle bg-orange">⏱️</div>
            <span>Rápido</span>
        </div>
        <div class="cat-item" onclick="filtrar('Farmacias')">
            <div class="icon-circle bg-green">💊</div>
            <span>Farmacias</span>
        </div>
        <div class="cat-item" onclick="filtrar('Mercados')">
            <div class="icon-circle bg-blue">🛒</div>
            <span>Mercados</span>
        </div>
    </section>

    <section class="nearby">
        <div class="section-title">
            <h3>Restaurantes Cercanos</h3>
            <a href="#">Ver todos</a>
        </div>
        <div id="restaurantes-lista" class="restaurantes-grid">
            </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/home-logic.js"></script>
</body>
</html>
