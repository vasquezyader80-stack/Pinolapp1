<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PinolApp</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-verde-login">
    <div class="login-container">
        <img src="images/logo-pinolapp.png" alt="PinolApp" class="logo-small">
        <h2>Bienvenido a PinolApp</h2>
        <p>Tu delivery 100% nicaragüense</p>
        
        <form id="login-form">
            <input type="email" id="email" placeholder="Correo electrónico" required>
            <input type="password" id="password" placeholder="Contraseña" required>
            <button type="submit" class="btn-primary">Iniciar Sesión</button>
        </form>
        
        <a href="register.html" class="link-registro">¿No tienes cuenta? Regístrate aquí</a>
    </div>

    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
