<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar Pedido - PinolApp</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header class="header-app">
        <button onclick="history.back()">⬅️</button>
        <h1>Finalizar Pedido</h1>
    </header>

    <div class="container">
        <h3>Tu Resumen</h3>
        <div id="resumen-pedido" class="card">
            </div>

        <div class="direccion-envio">
            <h3>📍 Dirección de Entrega</h3>
            <textarea id="direccion" placeholder="Ej: De la Gasolinera Uno 2c al sur, León"></textarea>
        </div>

        <div class="metodo-pago">
            <p><strong>Total a pagar:</strong> <span id="total-final">C$ 0.00</span></p>
        </div>

        <button id="btn-confirmar" class="btn-primary" onclick="procesarPedido()">
            Confirmar Pedido
        </button>
    </div>

    <script src="js/supabase-config.js"></script>
    <script src="js/checkout-logic.js"></script>
</body>
</html>
