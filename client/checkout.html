<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Pedido - PinolApp</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="checkout-header">
        <button onclick="window.history.back()">⬅️</button>
        <h2>Confirmar Pedido</h2>
    </header>

    <main class="checkout-body">
        <section class="delivery-info">
            <h3>📍 Dirección de entrega</h3>
            <textarea id="direccion" placeholder="Ej: De la cancillería 2c al sur, Managua"></textarea>
            
            <h3>📞 Teléfono de contacto</h3>
            <input type="tel" id="telefono" placeholder="+505 0000-0000">
        </section>

        <section class="order-summary">
            <h3>Resumen de pago</h3>
            <div class="summary-row">
                <span>Subtotal:</span>
                <span id="subtotal">C$ 0.00</span>
            </div>
            <div class="summary-row">
                <span>Envío:</span>
                <span>C$ 40.00</span>
            </div>
            <hr>
            <div class="summary-row total">
                <span>Total a pagar:</span>
                <span id="total-final">C$ 0.00</span>
            </div>
        </section>

        <section class="payment-method">
            <h3>💵 Método de pago</h3>
            <select id="metodo-pago">
                <option value="efectivo">Efectivo</option>
                <option value="transferencia">Transferencia (BAC/Banpro)</option>
            </select>
        </section>

        <button class="btn-confirmar" onclick="enviarPedido()">
            Confirmar Pedido C$ 
        </button>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/checkout-logic.js"></script>
</body>
</html>
