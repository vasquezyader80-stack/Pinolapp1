<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PinolApp - El Buen Sabor</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header class="header-app">
        <button onclick="history.back()">←</button>
        <h1>El Buen Sabor</h1>
        <div class="cart-icon">🛒<span id="cart-count">0</span></div>
    </header>

    <main id="lista-menu" class="container">
        <div class="loader-simple">Cargando menú nica...</div>
    </main>

    <footer class="footer-carrito">
        <button class="btn-primary">
            Ver carrito (<span id="total-carrito">C$ 0.00</span>)
        </button>
    </footer>

    <script src="js/supabase-config.js"></script>
    <script src="js/menu-loader.js"></script>
</body>
</html>
