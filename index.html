<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PinolApp - ¡A la orden!</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4CAF50">
    <style>
        :root { --verde: #4CAF50; --oscuro: #2E7D32; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: sans-serif; overflow: hidden; }
        #splash {
            background: linear-gradient(180deg, var(--verde), var(--oscuro));
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white;
        }
        .loader {
            border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid white;
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-top: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="splash">
        <img src="images/logo.png" alt="PinolApp" style="width:120px;" onerror="this.src='https://via.placeholder.com/120?text=PinolApp'">
        <h1>Cargando el sabor nica...</h1>
        <div class="loader"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                // Redirige a la subcarpeta client
                window.location.href = 'client/restaurant.html';
            }, 3000);
        });
    </script>
</body>
</html>
