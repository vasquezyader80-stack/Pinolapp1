<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Entrega | PinolApp</title>
    <link rel="stylesheet" href="../client/css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <header style="background-color: #007bff;">
        <button onclick="location.href='pedidos.html'">⬅ Salir</button>
        <h1>Ruta de Entrega</h1>
    </header>

    <div id="map" style="height: 400px; width: 100%;"></div>

    <div class="info-entrega" style="padding: 15px; background: white;">
        <h3 id="cliente-nombre">Cargando cliente...</h3>
        <p id="cliente-direccion">Dirección: ---</p>
        <button class="btn-ver" onclick="finalizarPedido()" style="background-color: #28a745;">Entregado ✅</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="../client/js/supabase-config.js"></script>
    <script src="js/map-logic.js"></script>
</body>
</html>
