<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos Entrantes | Panel Socio</title>
    <link rel="stylesheet" href="../client/css/style.css">
</head>
<body>
    <header style="background-color: #ffc107;">
        <h1>Pedidos del Día</h1>
    </header>
    <main id="lista-pedidos-restaurante" style="padding: 15px;">
        </main>
    <script src="../client/js/supabase-config.js"></script>
    <script>
        async function escucharNuevosPedidos() {
            _supabase.channel('pedidos-instante')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'pedidos' }, payload => {
                alert("¡Nuevo pedido recibido!");
                renderizarLista();
            }).subscribe();
        }
        // ... lógica para cambiar estado a "Preparando" o "Listo"
    </script>
</body>
</html>
