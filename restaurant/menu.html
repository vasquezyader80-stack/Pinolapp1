<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionar Menú | PinolApp</title>
    <link rel="stylesheet" href="../client/css/style.css">
</head>
<body>
    <header style="background-color: #ffc107; color: #000;">
        <h1>Gestionar mi Menú</h1>
        <button onclick="location.href='dashboard.html'">Volver</button>
    </header>

    <main class="admin-section">
        <h3>Agregar Nuevo Platillo</h3>
        <form id="add-product-form">
            <input type="text" id="prod-name" placeholder="Nombre (ej: Carne Asada)" required>
            <textarea id="prod-desc" placeholder="Descripción del plato"></textarea>
            <input type="number" id="prod-price" placeholder="Precio en Córdobas (C$)" required>
            <input type="url" id="prod-img" placeholder="URL de la foto del platillo">
            <button type="submit" class="btn-ver">Subir Producto</button>
        </form>

        <hr>
        <h3>Mis Productos Actuales</h3>
        <div id="product-list-admin">
            </div>
    </main>

    <script src="../client/js/supabase-config.js"></script>
    <script src="js/menu-manager.js"></script>
</body>
</html>
