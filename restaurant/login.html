<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socio PinolApp | Iniciar Sesión</title>
    <link rel="stylesheet" href="../client/css/style.css"> </head>
<body>
    <div class="login-container">
        <h2>Panel de Socio</h2>
        <p>Ingresá los datos de tu negocio</p>
        <form id="login-form">
            <input type="email" id="email" placeholder="Correo electrónico" required>
            <input type="password" id="password" placeholder="Contraseña" required>
            <button type="submit" class="btn-ver">Entrar al Panel</button>
        </form>
    </div>
    <script src="../client/js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
